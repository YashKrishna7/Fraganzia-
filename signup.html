<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body{
            background-color: white;

        }
        
        .image img{
            width: 500px;
            height: 500px;
            border-top-left-radius: 0px;
            border-top-right-radius: 200px;
            border-bottom-left-radius: 200px;
            border-bottom-right-radius: 0px;
        }
        .title h1{
            color: rgb(255, 255, 255);
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif ;
            margin-top: -300px;
            margin-left: 100px;
        }
        .title p{
            color: white;
            width: 280px;
            margin-left: 100px;
            text-align: center;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            font-size: 15px;
        }
        .main1{
            /* margin-left: 100px;
            margin-top: 100px; */
            padding:90px 10%
        }

        /* Registration Card */

        
        .register-card{
    
            max-width:450px;
            width:100%;
            border-radius:12px;
        }

        /* Social Buttons */

        .social-btn{
            border-radius:8px;
            font-weight:500;
            color:#333;
        }

        .social-icon{
            width:25px;
            height:20px;
        }

        /* Input Group */

        .input-icon{
            background:#e0e0e0;
            border:none;
            border-radius:8px 0 0 8px;
            color:#495057;
            padding-right:0;
        }

        .custom-input{
            background:#e0e0e0;
            border:none;
            border-radius:0 8px 8px 0;
            padding:14px 16px;
            font-size:.95rem;
        }

        .custom-input:focus{
            background:#e0e0e0;
            box-shadow:none;
        }

        .no-radius-right{
            border-radius:0;
        }

        /* Eye Icon */

        .input-eye{
            background:#e0e0e0;
            border:none;
            border-radius:0 8px 8px 0;
            color:#6c757d;
            cursor:pointer;
        }

        /* Checkbox */

        .custom-checkbox{
            width:18px;
            height:18px;
            cursor:pointer;
        }

        .custom-checkbox:checked{
            background-color:#002d44;
            border-color:#002d44;
        }

        /* Signup Button */

        .signup-btn{
            background:#002d44;
            border-radius:8px;
            font-weight:600;
            font-size:1.1rem;
            letter-spacing:.5px;
        }

        .signup-btn:hover{
            background:#01486d;
        }
        .main{
            display: flex;
            
        }


    </style>
</head>
<body>
    <div class="main">
        <div class="main1">
            <div class="image">
            <img src="images/image.png" alt="">
            </div>
            <div class="title">
                <h1> Let's Get Started !</h1>
                <p> Create your account and unlock the full potential of Fragranzia.</p>
            </div>
        </div>  
        
        <!-- Main Registration Container -->
        <div class="container d-flex justify-content-center align-items-center min-vh-100 bg-white">
            <div class="register-card card p-4 shadow-sm border-0">

                <!-- Social Login Buttons -->
                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <button class="social-btn btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center py-2 bg-white">
                            <img src="images/google-logo.webp" alt="Google" class="social-icon me-2">
                            Google
                        </button>
                    </div>

                    <div class="col-6">
                        <button class="social-btn btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center py-2 bg-white">
                            <!-- <img src="images/facebook.jpg" alt="Facebook" class="social-icon me-2"> -->
                            <i class="bi bi-facebook text-primary me-2 facebook-icon"></i>

                            Facebook
                        </button>
                    </div>
                </div>

                <!-- Divider -->
                <div class="d-flex align-items-center my-4">
                    <hr class="flex-grow-1 text-muted m-0">
                    <span class="px-3 text-muted small fw-medium text-nowrap">
                        Or sign up with email
                    </span>
                    <hr class="flex-grow-1 text-muted m-0">
                </div>

                <!-- Registration Form -->
                <form>

                    <!-- Username -->
                    <div class="input-group mb-3">
                        <span class="input-group-text input-icon">
                            <i class="bi bi-person-circle fs-5"></i>
                        </span>
                        <input type="text" class="form-control custom-input" placeholder="Enter your username">
                    </div>
                    <!-- Email -->
                    <div class="input-group mb-3">
                        <span class="input-group-text input-icon">
                            <i class="bi bi-envelope fs-5"></i>
                        </span>
                        <input type="email" class="form-control custom-input" placeholder="Enter your E-Mail">
                    </div>
                    <!-- Password -->
                    <div class="input-group mb-3">
                        <span class="input-group-text input-icon">
                            <i class="bi bi-lock fs-5"></i>
                        </span>
                        <input type="password" class="form-control custom-input no-radius-right" placeholder="Enter your password">
                        <span class="input-group-text input-eye">
                            <i class="bi bi-eye-slash"></i>
                        </span>
                    </div>

                    <!-- Confirm Password -->
                    <div class="input-group mb-3">
                        <span class="input-group-text input-icon">
                            <i class="bi bi-lock fs-5"></i>
                        </span>

                        <input type="password" class="form-control custom-input no-radius-right" placeholder="Confirm your password">

                        <span class="input-group-text input-eye">
                            <i class="bi bi-eye-slash"></i>
                        </span>
                    </div>

                    <!-- Terms -->
                    <div class="form-check mb-4 d-flex align-items-center">
                        <input class="form-check-input custom-checkbox mt-0 me-2" type="checkbox" id="termsCheck" checked>
                        <label class="form-check-label small text-dark" for="termsCheck">
                            Agree with
                            <a href="#" class="text-decoration-underline text-dark fw-medium">
                                Terms & Conditions
                            </a>
                        </label>
                    </div>

                    <!-- Button -->
                    <button type="submit" class="btn signup-btn w-100 py-3 text-white mb-4">
                    <a href="signin.html">Sign up</a>
                    </button>
                </form>

                <!-- Footer -->
                <div class="text-center small">
                    <span class="text-muted">
                        Already have an account?
                    </span>

                    <a href="signin.html" class="text-decoration-underline text-dark fw-medium">
                        Sign In
                    </a>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
