<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body{
            background-color: white;

        }
        
        .image img{
            width: 500px;
            height: 500px;
            /* border-top-left-radius: 0px;
            border-top-right-radius: 200px;
            border-bottom-left-radius: 200px;
            border-bottom-right-radius: 0px; */
        }
        /* .title h1{
            color: black;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif ;
            margin-top: -300px;
            margin-left: 100px;
        }
        .title p{
            color: black;
            width: 280px;
            margin-left: 100px;
            text-align: center;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            font-size: 15px;
        } */
        .main1{
            /* margin-left: 100px;
            margin-top: 100px; */
            padding:90px 10%
        }

        /* Login Container */

        .login-container{
            max-width:450px;
            width:100%;
            padding:20px;
        }

        /* Social Buttons */

        .social-btn{
            border-radius:8px;
        }

        .social-icon{
            width:18px;
            height:18px;
        }

        .facebook-icon{
            font-size:18px;
        }

        /* Input Icons */

        .login-icon{
            background:#f8f9fa;
            border:none;
            color:#6c757d;
            padding-left:16px;
            border-radius:8px 0 0 8px;
        }

        /* Inputs */

        .login-input{
            background:#f8f9fa;
            border:none;
            border-radius:0 8px 8px 0;
            padding:14px;
            box-shadow:none !important;
        }

        .login-input:focus{
            background:#f8f9fa;
            box-shadow:none;
        }

        .password-input{
            border-radius:0;
        }

        /* Eye Icon */

        .eye-icon{
            background:#f8f9fa;
            border:none;
            color:#6c757d;
            border-radius:0 8px 8px 0;
            padding-right:16px;
            cursor:pointer;
        }

        /* Login Button */

        .login-btn{
            background:#032b43;
            border-radius:8px;
            transition:.3s;
        }

        .login-btn:hover{
            background:#05415f;
        }

        .main{
            display: flex;
            gap: 10px;
        }
        
        


    </style>
</head>
<body>
    <div class="main">
        <div class="main1">
            <div class="image">
            <img src="images/Frame 184.png" alt="">
            </div>
            <!-- <div class="title">
                <h1>Welcome Back</h1>
                <p>Glad to see you again! Access your account to explore more</p>
            </div> -->
        </div>  
        
        <!-- form -->
        <div class="container d-flex justify-content-center align-items-center min-vh-100 bg-white">
            <div class="login-container">

                <!-- Social Login Buttons -->
                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <button class="btn btn-outline-dark w-100 py-2 d-flex align-items-center justify-content-center fw-medium social-btn">
                            <img src="images/google-logo.webp" alt="Google" class="social-icon me-2">
                            Google
                        </button>
                    </div>

                    <div class="col-6">
                        <button class="btn btn-outline-dark w-100 py-2 d-flex align-items-center justify-content-center fw-medium social-btn">
                            <i class="bi bi-facebook text-primary me-2 facebook-icon"></i>
                            Facebook
                        </button>
                    </div>
                </div>

                <!-- Divider -->
                <div class="d-flex align-items-center my-4">
                    <hr class="flex-grow-1 text-muted m-0">
                    <span class="px-3 text-muted small bg-white">
                        Or sign in with email
                    </span>
                    <hr class="flex-grow-1 text-muted m-0">
                </div>

                <!-- Login Form -->
                <form>

                    <!-- Username -->
                    <div class="input-group mb-3">
                        <span class="input-group-text login-icon">
                            <i class="bi bi-person-circle"></i>
                        </span>

                        <input type="text"
                            class="form-control login-input"
                            placeholder="Enter your username">
                    </div>

                    <!-- Password -->
                    <div class="input-group mb-2">
                        <span class="input-group-text login-icon">
                            <i class="bi bi-lock-fill"></i>
                        </span>

                        <input type="password"
                            class="form-control login-input password-input"
                            placeholder="Enter your password">

                        <span class="input-group-text eye-icon">
                            <i class="bi bi-eye-slash"></i>
                        </span>
                    </div>

                    <!-- Forgot Password -->
                    <div class="text-end mb-4">
                        <a href="#" class="text-decoration-underline small text-dark fw-medium">
                            Forgot Password?
                        </a>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="btn login-btn w-100 py-3 text-white fw-medium mb-4">
                        <a href="home.html">Log In</a>
                    </button>

                    <!-- Sign Up -->
                    <div class="text-center small text-dark">
                        Don't have an account?
                        <a href="signup.html" class="text-decoration-underline fw-medium text-dark">
                            Sign Up
                        </a>
                    </div>

                </form>

            </div>
        </div>
        
    </div>
</body>
</html>
