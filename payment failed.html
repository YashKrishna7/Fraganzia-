<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragranzia - Payment Failed</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-teal: #004d61;
            --brand-teal-dark: #003442;
            --error-red: #fa5252;
            --border-color: #e2e8f0;
            --text-dark: #1a202c;
            --text-muted: #718096;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            color: var(--text-dark);
            overflow: hidden; /* Lock background scrolling while modal is up */
        }

        /* Navbar Layout */
        .navbar-brand {
            font-weight: 700;
            color: var(--brand-teal) !important;
            font-size: 24px;
        }
        .nav-link {
            font-size: 13px;
            font-weight: 500;
            color: #4a5568 !important;
        }

        /* Background Content Blur Filter */
        .blurred-background-content {
            filter: blur(5px);
            pointer-events: none; /* Block interactions behind modal */
            user-select: none;
        }

        /* Checkout Card Elements */
        .checkout-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
            background: #ffffff;
        }
        .section-heading {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* Error Dialog Box Overlay Customization */
        .custom-error-modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1050;
        }

        .error-box-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 440px;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .error-x-circle {
            width: 90px;
            height: 90px;
            background-color: var(--error-red);
            color: #ffffff;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            margin-bottom: 25px;
            box-shadow: 0 4px 14px rgba(250, 82, 82, 0.3);
        }

        .modal-headline-title {
            font-size: 22px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 10px;
        }

        .modal-body-subtext {
            font-size: 13.5px;
            color: #4a5568;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* Modal Split Action Triggers */
        .btn-modal-change-method {
            background: transparent;
            color: #000000;
            border: 1px solid #111111;
            font-size: 13px;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .btn-modal-change-method:hover {
            background-color: #f7fafc;
        }

        .btn-modal-retry {
            background-color: var(--brand-teal);
            color: #ffffff;
            border: none;
            font-size: 13px;
            font-weight: 600;
            padding: 11px 24px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .btn-modal-retry:hover {
            background-color: var(--brand-teal-dark);
        }
    </style>
</head>
<body>

    <!-- ERROR MODAL DIALOG OVERLAY -->
    <div class="custom-error-modal-backdrop">
        <div class="error-box-container">
            <div class="error-x-circle">
                <i class="fa-solid fa-xmark"></i>
            </div>
            <h2 class="modal-headline-title">Your order has failed!</h2>
            <p class="modal-body-subtext">
                Your order can't be completed.<br>
                Please check your internet connection.
            </p>
            <div class="d-flex justify-content-center gap-3">
                <a href="home.html"><button class="btn btn-modal-change-method">Back to Home</button></a>
                <button class="btn btn-modal-retry">Retry</button>
            </div>
        </div>
    </div>

    <!-- BLURRED COURIER WRAPPER BASE CONTENT -->
    <div class="blurred-background-content">
        <!-- Header Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 border-bottom">
            <div class="container">
                <a class="navbar-brand" href="#">Fragranzia</a>
                <div class="collapse navbar-collapse">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Background Checkout Layout Structure -->
        <div class="container my-5">
            <div class="row g-4">
                <div class="col-lg-7">
                    <div class="checkout-card">
                        <h3 class="section-heading">Personal Details</h3>
                        <div style="height: 120px; background: #fafafa; border-radius: 6px;"></div>
                    </div>
                    <div class="checkout-card">
                        <h3 class="section-heading">Address</h3>
                        <div style="height: 100px; background: #fafafa; border-radius: 6px;"></div>
                    </div>
                </div>
                <div class="col-lg-5">
                    <div class="checkout-card">
                        <h3 class="section-heading">Price Details</h3>
                        <div style="height: 150px; background: #fafafa; border-radius: 6px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
