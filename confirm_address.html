<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragranzia - comfirm Address Overlay</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-teal: #004d61;
            --brand-teal-dark: #003442;
            --btn-blue: #0084b4;
            --btn-blue-hover: #006b94;
            --border-color: #cbd5e1;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: 76px; /* Space so fixed navbar doesn't clip underlying layout */
        }

        /* NAVBAR POSITIONED ON TOP OF EXTENDED LAYERS - NEVER BLURRED */
        .navbar-custom {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1100; /* Higher than the blur overlay index */
            background-color: #ffffff;
            border-bottom: 1px solid #edf2f7;
        }
        .navbar-brand {
            font-weight: 700;
            color: var(--brand-teal) !important;
            font-size: 24px;
        }
        .nav-link {
            font-size: 13px;
            font-weight: 500;
            color: #4a5568 !important;
        }
        .search-container {
            position: relative;
            width: 220px;
        }
        .search-container input {
            border-radius: 20px;
            background-color: #f1f3f5;
            border: none;
            font-size: 13px;
            padding: 6px 12px 6px 36px;
        }
        .search-container i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #8892b0;
            font-size: 13px;
        }
        .nav-icon {
            color: #2d3748;
            font-size: 16px;
        }
        .profile-icon-active {
            background-color: var(--brand-teal);
            color: white !important;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        /* Profile Background Elements Layout */
        .profile-title {
            font-size: 24px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 2px;
        }
        .breadcrumb-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }
        .profile-nav-btn {
            border: 1px solid var(--border-color);
            background-color: #ffffff;
            font-size: 12px;
            font-weight: 500;
            padding: 8px 30px;
            color: #1e293b;
            border-radius: 4px;
        }
        .profile-nav-btn.active {
            background-color: var(--brand-teal);
            color: #ffffff;
            border-color: var(--brand-teal);
        }
        .address-card-bg {
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 18px;
            max-width: 380px;
            opacity: 0.5;
        }

        /* BLUR OVERLAY RESTRICTED BELOW THE FIXED NAVBAR */
        .blur-overlay-wrapper {
            position: fixed;
            top: 76px; /* Starts exactly below the clear navbar */
            left: 0;
            width: 100vw;
            height: calc(100vh - 76px);
            z-index: 1050; /* Sits underneath the clear navbar layer */
            background-color: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 20px;
        }

        /* Form Content Modal Card Box matching WhatsApp Image 2026-07-03 at 9.59.41 PM.jpeg */
        .address-form-modal {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
            padding: 30px;
            width: 100%;
            max-width: 820px;
            margin: auto;
        }

        .section-label {
            font-size: 13px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 12px;
        }
        .type-strip {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .type-radio-btn {
            display: none;
        }
        .type-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 20px;
            font-size: 11px;
            font-weight: 600;
            background-color: #e2e8f0;
            color: #334155;
            border-radius: 4px;
            cursor: pointer;
        }
        .type-radio-btn:checked + .type-label {
            background-color: var(--brand-teal);
            color: #ffffff;
        }
        .form-label-custom {
            font-size: 11px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 6px;
        }
        .form-control-custom {
            font-size: 11px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px 12px;
        }
        .btn-save-address {
            background-color: var(--btn-blue);
            color: #ffffff;
            border: none;
            font-size: 12px;
            font-weight: 600;
            padding: 8px 32px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- 1. CLEAR TOP FIXED NAVBAR CONTAINER LAYER -->
    <nav class="navbar navbar-expand-lg navbar-light navbar-custom py-3">
        <div class="container">
            <a class="navbar-brand" href="#">Fragranzia</a>
            <div class="collapse navbar-collapse d-flex justify-content-between">
                <ul class="navbar-nav mx-auto align-items-center flex-row gap-4">
                    <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Gifting</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <div class="search-container">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input class="form-control" type="search" placeholder="Search here">
                    </div>
                    <a href="cart.html" class="nav-icon"><i class="fa-solid fa-basket-shopping"></i></a>
                    <a href="#" class="nav-icon"><i class="fa-regular fa-heart"></i></a>
                    <a href="profile.html" class="nav-icon profile-icon-active"><i class="fa-regular fa-user"></i></a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 2. UNDERLYING BODY WORKSPACE SYSTEM CONTENT -->
    <div class="container my-5">
        <h1 class="profile-title">Profile</h1>
        <div class="breadcrumb-sub">Home > Address</div>
        <div class="d-flex gap-2 mb-4">
            <button class="profile-nav-btn">Profile</button>
            <button class="profile-nav-btn active">Address</button>
            <button class="profile-nav-btn">My Orders</button>
        </div>
        <div class="address-card-bg">
            <div style="font-size:12px; font-weight:700;">Address 2</div>
            <div style="font-size:11px; color:#475569;">Priyesh Manu<br>Helpstir Technologies 3rd Floor...</div>
        </div>
    </div>

    <!-- 3. INTERACTIVE BACKDROP BLUR OVERLAY FOR FORM FIELDS DISPLAY SHEET -->
    <div class="blur-overlay-wrapper">
        <div class="address-form-modal">
            <form id="addressForm">
                
                <div class="section-label">Address Type</div>
                <div class="type-strip">
                    <div>
                        <input type="radio" name="address_type" id="type_home" class="type-radio-btn" checked>
                        <label for="type_home" class="type-label"><i class="fa-solid fa-house"></i> Home</label>
                    </div>
                    <div>
                        <input type="radio" name="address_type" id="type_office" class="type-radio-btn">
                        <label for="type_office" class="type-label"><i class="fa-solid fa-briefcase"></i> Office</label>
                    </div>
                    <div>
                        <input type="radio" name="address_type" id="type_other" class="type-radio-btn">
                        <label for="type_other" class="type-label"><i class="fa-solid fa-ellipsis"></i> Other</label>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label-custom">Full Name</label>
                        <input type="text" class="form-control form-control-custom w-100" placeholder="priyesh" readonly>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Phone Number</label>
                        <input type="tel" class="form-control form-control-custom w-100" placeholder="9876543210" readonly>
                    </div>

                    <div class="col-12">
                        <label class="form-label-custom">Address</label>
                        <textarea class="form-control form-control-custom w-100" rows="3" placeholder="Ruban villa kochi ,Ruther road" style="resize: none;" readonly></textarea>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label-custom">City/District</label>
                        <input type="text" class="form-control form-control-custom w-100" placeholder="Kochi" readonly>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label-custom">State</label>
                        <input type="text" class="form-control form-control-custom w-100" placeholder="Kerala" readonly>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label-custom">Land Mark</label>
                        <input type="text" class="form-control form-control-custom w-100" placeholder="Near LULu Mall" readonly>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label-custom">PinCode</label>
                        <input type="text" class="form-control form-control-custom w-100" placeholder="675433" readonly>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label-custom">Alternative Phone number(Optional)</label>
                        <input type="tel" class="form-control form-control-custom w-100" placeholder="Enter alternative Phone number" readonly>
                    </div>

                    <div class="col-12 d-flex justify-content-end mt-4">
                        <button type="submit" class="btn btn-save-address">Save</button>
                    </div>
                </div>

            </form>
        </div>
    </div>

</body>
</html>
